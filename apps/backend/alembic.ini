# Alembic configuration for the Whetstone backend.
#
# The database URL is resolved at runtime from application settings in
# ``alembic/env.py`` (so it honours WHETSTONE_DATABASE_URL and the .env
# file); the ``sqlalchemy.url`` below is only a placeholder fallback.

[alembic]
script_location = alembic
prepend_sys_path = .
path_separator = os

sqlalchemy.url = sqlite:///./whetstone.db


[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
