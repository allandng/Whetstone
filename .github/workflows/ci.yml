name: CI

on:
  push:
  pull_request:

jobs:
  backend:
    name: Backend (pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install backend (editable, with dev extras)
        run: pip install -e ".[dev]"
      - name: Run pytest
        run: pytest -q

  frontend:
    name: Frontend (typecheck, test, build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/desktop
    steps:
      - uses: actions/checkout@v4
      # Node 24 matches local dev and satisfies Vite 7 / Vitest 4's engine floor.
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: apps/desktop/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Test
        run: npm test
      - name: Build
        run: npm run build

  psirver:
    name: Psirver (C++ build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/psirver/src
    steps:
      - uses: actions/checkout@v4
      - name: Build psirver
        run: make
